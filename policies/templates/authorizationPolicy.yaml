{{- $root := . -}}

{{/*
Universal policies -> AuthorizationPolicy (owner + auto-mirror in target ns).
*/}}
{{- range $index, $policy := default (list) $root.Values.policies }}
{{- if eq (include "security-policies.enabled" (dict "policy" $policy)) "true" }}
{{- $namespace := $root.Release.Namespace -}}
{{- $selector := required (printf "policies[%d].selector is required" $index) $policy.selector -}}
{{- $ingress := default (list) $policy.ingress -}}
{{- $egress := default (list) $policy.egress -}}

{{/* Owner AuthorizationPolicy (from ingress rules). */}}
{{- if gt (len $ingress) 0 }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "security-policies.resourceName" (dict "name" $policy.name "shortkind" "ap" "context" $root) }}
  namespace: {{ $namespace | quote }}
  {{- include "security-policies.metadata" (dict "context" $root) | nindent 2 }}
spec:
  action: ALLOW
  selector:
    matchLabels:
      {{- toYaml $selector | nindent 6 }}
  rules:
    {{- range $rule := $ingress }}
    {{- $sources := list }}
    {{- $principals := list }}
    {{- $namespaces := list }}
    {{- $ipBlocks := list }}
    {{- range $peer := default (list) $rule.from }}
    {{- if $peer.ipBlock }}
    {{- $ipBlocks = append $ipBlocks $peer.ipBlock.cidr }}
    {{- else if $peer.serviceAccount }}
    {{- $sa := dict "namespace" (required "peer.namespace required when serviceAccount is set" $peer.namespace) "name" $peer.serviceAccount }}
    {{- $principals = append $principals (include "security-policies.istioPrincipal" (dict "root" $root "serviceAccount" $sa)) }}
    {{- else if $peer.namespace }}
    {{- $namespaces = append $namespaces $peer.namespace }}
    {{- end }}
    {{- end }}
    {{- $fromDict := dict }}
    {{- if gt (len $principals) 0 }}{{ $_ := set $fromDict "principals" $principals }}{{ end }}
    {{- if gt (len $namespaces) 0 }}{{ $_ := set $fromDict "namespaces" $namespaces }}{{ end }}
    {{- if gt (len $ipBlocks) 0 }}{{ $_ := set $fromDict "ipBlocks" $ipBlocks }}{{ end }}
    - from:
        - source:
{{ include "security-policies.authzSource" (dict "root" $root "from" $fromDict) | trim | indent 12 }}
      {{- if $rule.ports }}
      to:
        - operation:
            ports:
{{ include "security-policies.authzPorts" (dict "root" $root "ports" $rule.ports) | trim | indent 14 }}
      {{- end }}
    {{- end }}
{{- end }}

{{/* Mirror AuthorizationPolicy in each target namespace (from egress rules). */}}
{{- if gt (len $egress) 0 }}
{{- $ownerSA := required (printf "policies[%d] (%s): serviceAccount is required when egress rules are defined" $index $policy.name) $policy.serviceAccount }}
{{- $targets := dict }}
{{- range $ruleIndex, $rule := $egress }}
{{- range $peer := default (list) $rule.to }}
{{- if not $peer.ipBlock }}
{{- $targetNs := required (printf "policies[%d].egress[%d].to.namespace is required for mirroring" $index $ruleIndex) $peer.namespace }}
{{- $peerSelector := default (dict) $peer.selector }}
{{- $existing := index $targets $targetNs }}
{{- if $existing }}
{{- $mergedPorts := concat $existing.ports (default (list) $rule.ports) }}
{{- $_ := set $targets $targetNs (dict "selector" $peerSelector "ports" $mergedPorts) }}
{{- else }}
{{- $_ := set $targets $targetNs (dict "selector" $peerSelector "ports" (default (list) $rule.ports)) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- $ownerPrincipal := include "security-policies.istioPrincipal" (dict "root" $root "serviceAccount" (dict "namespace" $namespace "name" $ownerSA)) }}
{{- range $targetNs, $info := $targets }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "security-policies.resourceName" (dict "name" $policy.name "shortkind" "ap" "context" $root) }}
  namespace: {{ $targetNs | quote }}
  {{- include "security-policies.metadata" (dict "context" $root) | nindent 2 }}
spec:
  action: ALLOW
  {{- if gt (len $info.selector) 0 }}
  selector:
    matchLabels:
      {{- toYaml $info.selector | nindent 6 }}
  {{- end }}
  rules:
    - from:
        - source:
            principals:
              - {{ $ownerPrincipal | quote }}
      {{- if gt (len $info.ports) 0 }}
      to:
        - operation:
            ports:
{{ include "security-policies.authzPorts" (dict "root" $root "ports" $info.ports) | trim | indent 14 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{/*
Explicit authzpol -> AuthorizationPolicy.
*/}}
{{- range $index, $policy := default (list) $root.Values.authzpol }}
{{- if eq (include "security-policies.enabled" (dict "policy" $policy)) "true" }}
{{- $namespace := $root.Release.Namespace -}}
{{- $rules := required (printf "authzpol[%d].rules is required" $index) $policy.rules }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "security-policies.resourceName" (dict "name" $policy.name "shortkind" "ap" "context" $root) }}
  namespace: {{ $namespace | quote }}
  {{- include "security-policies.metadata" (dict "context" $root) | nindent 2 }}
spec:
  action: {{ default "ALLOW" $policy.action | quote }}
  {{- if $policy.selector }}
  selector:
    matchLabels:
      {{- toYaml $policy.selector | nindent 6 }}
  {{- end }}
  rules:
    {{- range $ruleIndex, $rule := $rules }}
    -
      {{- if $rule.from }}
      from:
        - source:
{{ include "security-policies.authzSource" (dict "root" $root "from" $rule.from) | trim | indent 12 }}
      {{- end }}
      {{- if $rule.ports }}
      to:
        - operation:
            ports:
{{ include "security-policies.authzPorts" (dict "root" $root "ports" $rule.ports) | trim | indent 14 }}
      {{- end }}
      {{- if $rule.when }}
      when:
        {{- if $rule.when.sourceNamespaces }}
        - key: source.namespace
          values:
            {{- range $namespace := $rule.when.sourceNamespaces }}
            - {{ $namespace | quote }}
            {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}

{{- $root := . -}}

{{/*
First block: universal policies -> NetworkPolicy (owner + auto-mirror in target ns).
*/}}
{{- range $index, $policy := default (list) $root.Values.policies }}
{{- if eq (include "security-policies.enabled" (dict "policy" $policy)) "true" }}
{{- $namespace := $root.Release.Namespace -}}
{{- $selector := required (printf "policies[%d].selector is required" $index) $policy.selector -}}
{{- $ingress := default (list) $policy.ingress -}}
{{- $egress := default (list) $policy.egress -}}

{{/* Validate: peer.serviceAccount forbidden in egress (use top-level policy.serviceAccount). */}}
{{- range $rule := $egress }}
{{- range $peer := default (list) $rule.to }}
{{- if $peer.serviceAccount }}
{{- fail (printf "policies[%d] (%s): egress peer.serviceAccount is forbidden; use top-level policy.serviceAccount" $index $policy.name) }}
{{- end }}
{{- end }}
{{- end }}

{{/* Owner NetworkPolicy. */}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "security-policies.resourceName" (dict "name" $policy.name "shortkind" "np" "context" $root) }}
  namespace: {{ $namespace | quote }}
  {{- include "security-policies.metadata" (dict "context" $root) | nindent 2 }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml $selector | nindent 6 }}
  policyTypes:
    {{- if gt (len $ingress) 0 }}
    - Ingress
    {{- end }}
    {{- if gt (len $egress) 0 }}
    - Egress
    {{- end }}
  {{- if gt (len $ingress) 0 }}
  ingress:
    {{- range $rule := $ingress }}
    - from:
        {{- range $peer := default (list) $rule.from }}
        - {{ include "security-policies.netpolPeer" (dict "root" $root "peer" $peer) | nindent 10 | trim }}
        {{- end }}
      {{- if $rule.ports }}
      ports:
{{ include "security-policies.netpolPorts" (dict "root" $root "ports" $rule.ports) | trim | indent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if gt (len $egress) 0 }}
  egress:
    {{- range $rule := $egress }}
    - to:
        {{- range $peer := default (list) $rule.to }}
        - {{ include "security-policies.netpolPeer" (dict "root" $root "peer" $peer) | nindent 10 | trim }}
        {{- end }}
      {{- if $rule.ports }}
      ports:
{{ include "security-policies.netpolPorts" (dict "root" $root "ports" $rule.ports) | trim | indent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}

{{/*
Mirror NetworkPolicies in peer namespaces.

- egress rules -> an Ingress mirror in each target namespace (the target may
  receive traffic from the owner);
- ingress rules -> an Egress mirror in each sender namespace (the sender may
  reach the owner without a separate policies release in its namespace).

Only peers in the namespace(+selector) form are mirrored: ipBlock and raw
namespaceSelector/podSelector peers are skipped. When the same namespace is
both an egress target and an ingress sender, the two directions merge into a
single manifest and must use the same selector.
*/}}
{{- $mirrors := dict }}
{{- range $ruleIndex, $rule := $egress }}
{{- range $peer := default (list) $rule.to }}
{{- if not $peer.ipBlock }}
{{- $targetNs := required (printf "policies[%d].egress[%d].to.namespace is required for mirroring" $index $ruleIndex) $peer.namespace }}
{{- $peerSelector := default (dict) $peer.selector }}
{{- $entry := default (dict) (index $mirrors $targetNs) }}
{{- if hasKey $entry "inSelector" }}
{{- if not (eq (toYaml (index $entry "inSelector")) (toYaml $peerSelector)) }}
{{- fail (printf "policies[%d] (%s): egress to namespace %q uses different selectors across rules; split into separate policies" $index $policy.name $targetNs) }}
{{- end }}
{{- $_ := set $entry "inPorts" (concat (index $entry "inPorts") (default (list) $rule.ports)) }}
{{- else }}
{{- $_ := set $entry "inSelector" $peerSelector }}
{{- $_ := set $entry "inPorts" (default (list) $rule.ports) }}
{{- end }}
{{- $_ := set $mirrors $targetNs $entry }}
{{- end }}
{{- end }}
{{- end }}

{{- range $ruleIndex, $rule := $ingress }}
{{- range $peer := default (list) $rule.from }}
{{- if $peer.namespace }}
{{- $senderNs := $peer.namespace }}
{{- $peerSelector := default (dict) $peer.selector }}
{{- $entry := default (dict) (index $mirrors $senderNs) }}
{{- if hasKey $entry "outSelector" }}
{{- if not (eq (toYaml (index $entry "outSelector")) (toYaml $peerSelector)) }}
{{- fail (printf "policies[%d] (%s): ingress from namespace %q uses different selectors across rules; split into separate policies" $index $policy.name $senderNs) }}
{{- end }}
{{- $_ := set $entry "outPorts" (concat (index $entry "outPorts") (default (list) $rule.ports)) }}
{{- else }}
{{- $_ := set $entry "outSelector" $peerSelector }}
{{- $_ := set $entry "outPorts" (default (list) $rule.ports) }}
{{- end }}
{{- $_ := set $mirrors $senderNs $entry }}
{{- end }}
{{- end }}
{{- end }}

{{- range $peerNs, $info := $mirrors }}
{{- $hasIn := hasKey $info "inSelector" }}
{{- $hasOut := hasKey $info "outSelector" }}
{{- if and $hasIn $hasOut }}
{{- if not (eq (toYaml (index $info "inSelector")) (toYaml (index $info "outSelector"))) }}
{{- fail (printf "policies[%d] (%s): namespace %q is both an egress target and an ingress sender with different selectors; split into separate policies" $index $policy.name $peerNs) }}
{{- end }}
{{- end }}
{{- $podSelector := ternary (index $info "inSelector") (index $info "outSelector") $hasIn }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "security-policies.resourceName" (dict "name" $policy.name "shortkind" "np" "context" $root) }}
  namespace: {{ $peerNs | quote }}
  {{- include "security-policies.metadata" (dict "context" $root) | nindent 2 }}
spec:
  podSelector:
    {{- if gt (len $podSelector) 0 }}
    matchLabels:
      {{- toYaml $podSelector | nindent 6 }}
    {{- else }}
    {}
    {{- end }}
  policyTypes:
    {{- if $hasIn }}
    - Ingress
    {{- end }}
    {{- if $hasOut }}
    - Egress
    {{- end }}
  {{- if $hasIn }}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ default "kubernetes.io/metadata.name" $root.Values.defaults.namespaceLabelKey }}: {{ $namespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml $selector | nindent 14 }}
      {{- if gt (len (index $info "inPorts")) 0 }}
      ports:
{{ include "security-policies.netpolPorts" (dict "root" $root "ports" (index $info "inPorts")) | trim | indent 8 }}
      {{- end }}
  {{- end }}
  {{- if $hasOut }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{ default "kubernetes.io/metadata.name" $root.Values.defaults.namespaceLabelKey }}: {{ $namespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml $selector | nindent 14 }}
      {{- if gt (len (index $info "outPorts")) 0 }}
      ports:
{{ include "security-policies.netpolPorts" (dict "root" $root "ports" (index $info "outPorts")) | trim | indent 8 }}
      {{- end }}
  {{- end }}
{{- end }}

{{- end }}
{{- end }}

{{/*
Second block: explicit netpol.
*/}}
{{- range $index, $policy := default (list) $root.Values.netpol }}
{{- if eq (include "security-policies.enabled" (dict "policy" $policy)) "true" }}
{{- $namespace := $root.Release.Namespace -}}
{{- $selector := default (dict) $policy.selector -}}
{{- $ingress := default (list) $policy.ingress -}}
{{- $egress := default (list) $policy.egress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "security-policies.resourceName" (dict "name" $policy.name "shortkind" "np" "context" $root) }}
  namespace: {{ $namespace | quote }}
  {{- include "security-policies.metadata" (dict "context" $root) | nindent 2 }}
spec:
  podSelector:
    {{- if gt (len $selector) 0 }}
    matchLabels:
      {{- toYaml $selector | nindent 6 }}
    {{- else }}
    {}
    {{- end }}
  policyTypes:
    {{- if gt (len $ingress) 0 }}
    - Ingress
    {{- end }}
    {{- if gt (len $egress) 0 }}
    - Egress
    {{- end }}
  {{- if gt (len $ingress) 0 }}
  ingress:
    {{- range $rule := $ingress }}
    - from:
        {{- range $peer := default (list) $rule.from }}
        - {{ include "security-policies.netpolPeer" (dict "root" $root "peer" $peer) | nindent 10 | trim }}
        {{- end }}
      {{- if $rule.ports }}
      ports:
{{ include "security-policies.netpolPorts" (dict "root" $root "ports" $rule.ports) | trim | indent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if gt (len $egress) 0 }}
  egress:
    {{- range $rule := $egress }}
    - to:
        {{- range $peer := default (list) $rule.to }}
        - {{ include "security-policies.netpolPeer" (dict "root" $root "peer" $peer) | nindent 10 | trim }}
        {{- end }}
      {{- if $rule.ports }}
      ports:
{{ include "security-policies.netpolPorts" (dict "root" $root "ports" $rule.ports) | trim | indent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}

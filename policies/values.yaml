# ============================================================================
#  Helm chart: policies — reference values.yaml
#  Все параметры с описанием. Три независимые секции (можно использовать любую
#  комбинацию):
#
#    policies[]  — универсальные политики. Один блок описывает связь
#                  source <-> target. Генерируются NetworkPolicy и
#                  AuthorizationPolicy с авто-зеркалированием egress правил
#                  в namespace получателя.
#
#    netpol[]    — только NetworkPolicy, без зеркал. Используй когда нужен
#                  тонкий L3/L4 контроль или ipBlock без Istio AP.
#
#    authzpol[]  — только AuthorizationPolicy. Используй для L7 (when, paths,
#                  кастомные principals) или когда NP описаны другим путём.
#
#  Конвенция именования ресурсов:
#    {instanceTag}-{clusterTag}-{kindShort}-{projectTag}-{name}
#  kindShort: np (NetworkPolicy) | ap (AuthorizationPolicy).
#  Имена должны быть уникальны в пределах (namespace, kind).
# ============================================================================


# ----------------------------------------------------------------------------
# naming — общие теги для имён ресурсов (см. конвенцию выше)
# ----------------------------------------------------------------------------
# instanceTag / clusterTag / projectTag задаются один раз на релиз.
# kindShort подставляется автоматически по типу ресурса (np | ap).
# name — это policy.name (2..6 символов, DNS) в секциях ниже.
naming:
  # Тег инстанса (таблица 50). Required, DNS-формат lower-case.
  instanceTag: ru1

  # Тег кластера (таблица 52). Required, DNS-формат lower-case.
  clusterTag: k8s1

  # Тег проекта. Required, 2..6 символов, DNS-формат lower-case.
  projectTag: nbox


# ----------------------------------------------------------------------------
# defaults
# ----------------------------------------------------------------------------
defaults:
  # Istio trust domain для построения principal:
  #   {trustDomain}/ns/{namespace}/sa/{serviceAccount}
  trustDomain: cluster.local

  # Label-ключ namespace для NetworkPolicy namespaceSelector.
  # Стандарт k8s — kubernetes.io/metadata.name (выставляется автоматически).
  namespaceLabelKey: kubernetes.io/metadata.name

  # Протокол по умолчанию для портов в NetworkPolicy.
  # Переопределяется per-port: ports: [{ port: 53, protocol: UDP }]
  protocol: TCP


# ============================================================================
# policies — универсальные политики (NetworkPolicy + AuthorizationPolicy)
# ============================================================================
# Одна запись → до 4 манифестов:
#   - в policy.namespace:        {name}-np (ingress+egress) и {name}-ap
#   - в каждом target namespace: {name}-np (ingress) и {name}-ap (mirror)
#
# Несколько egress правил с одним target.namespace мерджатся в один
# манифест на стороне target (ports объединяются).
policies:
  - # Короткое имя политики (2..6 символов, DNS-format).
    name: core1

    # Опционально, default: true. Если false — вся policy пропускается.
    enabled: true

    # Namespace, в котором живёт описываемый workload (owner).
    namespace: netbox-core

    # ServiceAccount owner-workload. Идёт в principal зеркальных AP
    # на стороне target. Обязателен при наличии egress правил.
    serviceAccount: netbox

    # Pod selector owner-workload. Применяется как:
    #   - podSelector в owner NetworkPolicy
    #   - selector   в owner AuthorizationPolicy
    selector:
      app.kubernetes.io/name: netbox

    # Ingress правила: кому разрешено ходить В owner.
    # Каждое правило → spec.ingress (NP) и одна запись в spec.rules (AP).
    ingress:
      - # Источники трафика. Поддерживаются формы:
        #   namespace + selector (+ опц. serviceAccount для AP principals)
        #   ipBlock
        #   namespaceSelector / podSelector (raw k8s формат, advanced)
        from:
          - namespace: netbox-ingress
            selector:
              app.kubernetes.io/name: ingress-istio
            # Опционально: SA отправителя для AP principal.
            #   указан → principals: cluster.local/ns/.../sa/<SA>
            #   нет    → fallback на namespaces: [<namespace>]
            serviceAccount: netbox-ingress-gateway-istio

        # Порты. Формы:
        #   - 8080                                     (используется defaults.protocol)
        #   - { port: 8080, protocol: TCP }            (явный протокол)
        ports: [8080]

    # Egress правила: куда owner может ходить.
    # Каждое правило → spec.egress в owner NP И зеркала NP+AP в target ns.
    egress:
      - to:
          - namespace: netbox-postgresql
            selector:
              app.kubernetes.io/name: postgresql
            # ВНИМАНИЕ: peer.serviceAccount в egress ЗАПРЕЩЁН — рендер упадёт.
            # Owner SA берётся из policy.serviceAccount.
        ports: [5432]

      - to:
          - namespace: netbox-valkey
            selector:
              app.kubernetes.io/name: valkey
        ports:
          - port: 6379
            protocol: TCP


# ============================================================================
# netpol — только NetworkPolicy (без AuthorizationPolicy и без зеркал)
# ============================================================================
# Используй для L3/L4-only сценариев или ipBlock-правил.
netpol:
  - # Имя ресурса: {name}-np.
    name: ing

    enabled: true

    namespace: netbox-ingress

    # podSelector. Пустой/отсутствует → политика применяется ко всем pod в ns.
    selector:
      app.kubernetes.io/name: ingress-istio

    # Ingress rules: список {from: [...], ports: [...]}.
    ingress:
      - from:
          - ipBlock:
              cidr: 0.0.0.0/0
              # except: [10.0.0.0/8]
        ports: [443, 15020, 15021, 15090]

    # Egress rules: список {to: [...], ports: [...]}.
    egress:
      - to:
          - namespace: netbox-core
            selector:
              app.kubernetes.io/name: netbox
        ports: [8080]


# ============================================================================
# authzpol — только AuthorizationPolicy (без NetworkPolicy)
# ============================================================================
# Используй для L7-правил Istio или когда NP описаны другим инструментом.
authzpol:
  - # Имя ресурса: {name}-ap.
    name: gate

    enabled: true

    namespace: netbox-ingress

    # action: ALLOW (default) | DENY | AUDIT | CUSTOM
    action: ALLOW

    # selector — кому применяется policy. Опущен → ко всем workload в ns.
    selector:
      app.kubernetes.io/name: ingress-istio

    # rules: список правил. Каждое правило может содержать from / ports / when.
    rules:
      - # Источник. Поддерживаемые формы:
        #   serviceAccounts — переводится в principals
        #   principals      — сырые principal строки
        #   ipBlocks
        #   namespaces
        from:
          ipBlocks:
            - 0.0.0.0/0
        ports: [443]

  - name: vkpr

    namespace: netbox-valkey

    selector:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/component: primary

    rules:
      - from:
          serviceAccounts:
            - namespace: netbox-core
              name: netbox
            - namespace: netbox-valkey
              name: netbox-valkey-primary
            - namespace: netbox-valkey
              name: netbox-valkey-replica
        ports: [6379]

        # when conditions. Сейчас поддерживается sourceNamespaces.
        when:
          sourceNamespaces:
            - netbox-core
            - netbox-valkey

{{- if .Values.global.enable }}
{{ if .Values.subnet.enable }}
{{- $root := . }}
{{- range .Values.subnet.subnets }}
{{- $gatewayIP := include "managed-ns.getGatewayIP" .cidrBlock -}}
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: {{ .name | lower | trunc 63 | trimSuffix "-" }}
spec:
  default: false
  protocol: IPv4
  cidrBlock: {{ .cidrBlock }}
  natOutgoing: false
  excludeIps:   
    - {{ $gatewayIP }}
    {{- if .excludeIps }}
    {{- range .excludeIps }}
    - {{ . }}
    {{- end }}
    {{- end }}
  gateway: {{ $gatewayIP }}
  gatewayType: centralized
  private: true
  allowSubnets:
    - 172.30.0.0/15
    {{- if .allowSubnets }}
    {{- range .allowSubnets }}
    - {{ . }}
    {{- end }}
    {{- end }}
  enableEcmp: false
  namespaces:
    - {{ $root.Values.namespace.namespaceName }}
{{- end }}
{{- end }}
#default - у всех создаваемых  пользовательских подсетей данный параметр должен быть в false
#protocol - тип протокола, может быть также IPv6 или Dual
#natOutgoing - параметр включения для исходящего трафика NAT в хост-сети ноды-шлюза (например, доступ в Интернет).
#Для изолированной (spec.private=true) подсети должно быть значение spec.natOutgoing=false
#excludeIps - зарезервированные IP, которые не нужно выдавать Pod-ам
#gateway - адрес Virtual-Router подсети
#gatewayType - параметры типа исходящего шлюза - только централизованный
#gatewayNode - перечень узлов в роли исходящего шлюза (должны иметь метки out-gate=true)
#private - тип подсети - изолированная или нет
#allowSubnets - допустимые подсети для связности (в перечне должна быть как минимум подсети ovn-default и Service-Subnet)
#enableEcmp - параметр включения ECMP для балансировки исходящего трафика по шлюзовым нодам
#namespaces - перечень namespaces, привязанных к данной подсети
{{- end -}}
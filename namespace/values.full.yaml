# ============================================================================
#  Helm chart: managed-namespace - full values reference
#  Creates a Namespace (cpaas/Alauda), ResourceQuota and kube-ovn Subnet.
#  Any resource is created only when global.enable=true.
# ============================================================================

global:
  # Main chart switch. false -> no resource is created.
  # Service field, hidden in the portal form; enabled by the console on order.
  enable: true

# ----------------------------------------------------------------------------
# namespace - parameters of the Namespace being created
# ----------------------------------------------------------------------------
namespace:
  # Namespace name. Format: <product>-<env>-ns-<purpose>. Required.
  namespaceName: "project-dev-ns-default"

  # Name of the project the Namespace belongs to. Required.
  projectName: project

  # Alauda cluster name.
  clusterName: common

  # Display name (annotation cpaas.io/display-name).
  displayName: "Managed namespace"

  # Namespace creator (annotation cpaas.io/creator). Default "lk".
  # Hidden in the portal form; on order from the console "console" is substituted.
  creator: lk

  # Namespace role -> namespace-role label. Allowed: ingress | egress | other.
  # Optional: without a value the label is not set.
  role: other

  # Additional annotations on the Namespace.
  annotations: {}

  # Additional labels on the Namespace.
  labels: {}

# ----------------------------------------------------------------------------
# serviceMesh - integration with Istio (ambient) and network policies
# ----------------------------------------------------------------------------
# Enabled at the environment level (not by the user): on DEV by a flag, on
# other environments Service Mesh is always enabled. When enabled=true the
# Namespace gets:
#   labels:      istio-discovery=enabled, istio.io/dataplane-mode=ambient
#   annotation:  networking.k8s.io/enable-netpol="true"
serviceMesh:
  enabled: false

# ----------------------------------------------------------------------------
# resourceQuotas - ResourceQuota for the Namespace
# ----------------------------------------------------------------------------
resourceQuotas:
  # Hard limits on the namespace.
  limits:
    cpu: "4"
    memory: "8Gi"

  # Requests. If not set - taken from limits.
  requests:
    cpu: "2"
    memory: "4Gi"

  # Maximum number of pods (in practice limited by the subnet mask).
  # Service field, hidden in the portal form.
  podsAmount: 1000

  # Block storage quotas in the format { <StorageClass>: <Quota> }.
  storage:
    storages: {}
    # storages:
    #   fast-ssd: 100Gi

# ----------------------------------------------------------------------------
# subnet - kube-ovn Subnet(s) for the Namespace
# ----------------------------------------------------------------------------
# Some Subnet fields are fixed in the template and not configurable:
#   default=false           - user subnets are always non-default.
#   protocol=IPv4           - protocol type (IPv6/Dual not used).
#   natOutgoing=false       - for an isolated (private=true) subnet NAT is off.
#   gateway                 - Virtual-Router address, computed from cidrBlock.
#   gatewayType=centralized - egress gateway type.
#   private=true            - the subnet is isolated.
#   enableEcmp=false        - ECMP balancing of egress traffic is off.
#   namespaces              - the subnet is bound to exactly one Namespace.
subnet:
  # Enable only when the CIDR is guaranteed to be reserved in Netbox.
  # Service field, hidden in the portal form.
  enable: false

  # List of subnets (at least one when enable=true).
  subnets:
    - # Subnet name. Format: <product>-<env>-subnet-<purpose>. Required.
      name: "project-dev-subnet-default"

      # CIDR block reserved in Netbox (IP/mask, mask >= 24). Required.
      cidrBlock: ""

      # Reserved IPs that are not handed out to pods.
      # The gateway IP is added to the exclusions automatically.
      excludeIps: []

      # Subnets allowed for connectivity.
      # ovn-default and Service-Subnet (172.30.0.0/15) are already included by the template.
      allowSubnets: []

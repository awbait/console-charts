# ============================================================================
#  Helm chart: managed-namespace - полный справочник values
#  Создаёт Namespace (cpaas/Alauda), ResourceQuota и kube-ovn Subnet.
#  Любой ресурс создаётся только при global.enable=true.
# ============================================================================

global:
  # Главный выключатель чарта. false -> не создаётся ни один ресурс.
  # Служебное поле, скрыто в форме портала; включается консолью при заказе.
  enable: true

# ----------------------------------------------------------------------------
# namespace - параметры создаваемого Namespace
# ----------------------------------------------------------------------------
namespace:
  # Имя Namespace. Формат: <product>-<env>-ns-<purpose>. Required.
  namespaceName: "project-dev-ns-default"

  # Имя проекта, которому принадлежит Namespace. Required.
  projectName: project

  # Имя кластера Alauda.
  clusterName: common

  # Отображаемое имя (annotation cpaas.io/display-name).
  displayName: "Managed by ECPK"

  # Дополнительные annotations на Namespace.
  annotations: {}

  # Дополнительные labels на Namespace.
  labels: {}

# ----------------------------------------------------------------------------
# resourceQuotas - ResourceQuota для Namespace
# ----------------------------------------------------------------------------
resourceQuotas:
  # Жёсткие лимиты на namespace.
  limits:
    cpu: "4"
    memory: "8Gi"

  # Запросы. Если не заданы - подставляются из limits.
  requests:
    cpu: "2"
    memory: "4Gi"

  # Максимальное число подов (фактически ограничено маской подсети).
  # Служебное поле, скрыто в форме портала.
  podsAmount: 1000

  # Квоты на блочные хранилища в формате { <StorageClass>: <Quota> }.
  storage:
    storages: {}
    # storages:
    #   fast-ssd: 100Gi

# ----------------------------------------------------------------------------
# subnet - kube-ovn Subnet(ы) для Namespace
# ----------------------------------------------------------------------------
# Часть полей Subnet фиксирована в шаблоне и не настраивается:
#   default=false           - пользовательские подсети всегда не default.
#   protocol=IPv4           - тип протокола (IPv6/Dual не используются).
#   natOutgoing=false       - для изолированной (private=true) подсети NAT выключен.
#   gateway                 - адрес Virtual-Router, вычисляется из cidrBlock.
#   gatewayType=centralized - тип исходящего шлюза.
#   private=true            - подсеть изолированная.
#   enableEcmp=false        - ECMP-балансировка исходящего трафика выключена.
#   namespaces              - подсеть привязывается ровно к одному Namespace.
subnet:
  # Включать только когда CIDR гарантированно зарезервирован в Netbox.
  # Служебное поле, скрыто в форме портала.
  enable: false

  # Список подсетей (минимум одна при enable=true).
  subnets:
    - # Имя подсети. Формат: <product>-<env>-subnet-<purpose>. Required.
      name: "project-dev-subnet-default"

      # CIDR-блок, зарезервированный в Netbox (IP/mask, маска >= 24). Required.
      cidrBlock: ""

      # Зарезервированные IP, которые не выдаются подам.
      # IP шлюза добавляется в исключения автоматически.
      excludeIps: []

      # Допустимые для связности подсети.
      # ovn-default и Service-Subnet (172.30.0.0/15) уже включены шаблоном.
      allowSubnets: []

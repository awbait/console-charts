# managed-namespace - default values (minimal, so rendering passes).
# When global.enable=false the chart creates no resources.
# Full parameter reference - values.full.yaml; working example - values.minimal.yaml.

global:
  enable: false

generic:
  labels: {}           # общие labels на ВСЕ ресурсы чарта (Namespace/ResourceQuota/Subnet)
  annotations: {}      # общие annotations на ВСЕ ресурсы чарта

namespace:
  namespaceName: "project-dev-ns-default"
  projectName: project
  clusterName: common
  displayName: "Managed namespace"
  creator: lk
  annotations: {}
  labels: {}

serviceMesh:
  enabled: false

resourceQuotas:
  limits:
    cpu: ""
    memory: ""
  requests:
    cpu: ""
    memory: ""
  podsAmount: 1000
  storage:
    storages: {}

subnet:
  enable: false
  subnets:
    - name: "project-dev-subnet-default"
      cidrBlock: ""
      excludeIps: []
      allowSubnets: []

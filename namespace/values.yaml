global:
  enable: false

namespace:
  namespaceName: "project-dev-ns-default"
  projectName: project
  clusterName: common
  #displayName: ""
  annotations: {}
  labels: {}

resourceQuotas:
  limits:
    cpu: ""
    memory: ""
  requests:
    cpu: ""
    memory: ""
  podsAmount: 1000
  storage:
    storages: {}


subnet:
  enable: false
  subnets:
    - name: "project-dev-subnet-default"
      #protocol: IPv4 # the value is hardcoded
      cidrBlock: ""
      #natOutgoing: false # the value is hardcoded
      #gateway: is extracted from cidrBlock
      excludeIps: []
      #private: true # the value is hardcoded
      allowSubnets: []
      #enableEcmp: false # the value is hardcoded
      #namespaces: # the only one ns is allowed
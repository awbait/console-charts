apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "console.portal.fullname" . }}-config
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.portal.selectorLabels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.portal.config }}
  {{- if ne (toString $v) "" }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}

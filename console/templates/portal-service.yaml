apiVersion: v1
kind: Service
metadata:
  name: {{ include "console.portal.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.portal.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.portal.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.portal.metrics.enabled }}
    - name: metrics
      port: {{ .Values.portal.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "console.portal.selectorLabels" . | nindent 4 }}

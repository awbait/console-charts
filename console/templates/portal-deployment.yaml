apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "console.portal.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.portal.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.portal.replicaCount }}
  selector:
    matchLabels:
      {{- include "console.portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Перекатываем поды при изменении конфигурации/секрета.
        checksum/config: {{ include (print $.Template.BasePath "/portal-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/portal-secret.yaml") . | sha256sum }}
        {{- with .Values.portal.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "console.labels" . | nindent 8 }}
        {{- include "console.portal.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "console.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.portal.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: portal
          image: {{ include "console.image" (dict "image" .Values.portal.image "registry" .Values.imageRegistry "defaultTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.portal.image.pullPolicy }}
          {{- with .Values.portal.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.portal.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "console.portal.fullname" . }}-config
            - secretRef:
                name: {{ include "console.portal.secretName" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.portal.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.portal.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.portal.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.portal.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

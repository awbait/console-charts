apiVersion: v1
kind: Service
metadata:
  name: {{ include "console.web.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.web.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "console.web.selectorLabels" . | nindent 4 }}

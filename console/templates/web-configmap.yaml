apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "console.web.fullname" . }}-nginx
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.web.selectorLabels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # Проксирование API на portal. Аутентификация - OIDC (Keycloak): наружу
      # проходит session cookie, заголовки запроса не подменяются.
      location /api/ {
        proxy_pass http://{{ include "console.portal.fullname" . }}:{{ .Values.portal.service.port }};
        proxy_set_header Host $host;

        # SSE-friendly
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
      }

      # SPA fallback
      location / {
        try_files $uri $uri/ /index.html;
      }
    }

{{- if and .Values.collector.enabled .Values.collector.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "console.collector.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.collector.selectorLabels" . | nindent 4 }}
rules:
  # List namespaces (label filtering happens on the request side).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Controllers whose podTemplate is used to build the catalog.
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "console.collector.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
    {{- include "console.collector.selectorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "console.collector.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "console.collector.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

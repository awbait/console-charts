# Значения по умолчанию для чарта console.
# console - один компонент: portal (Go-бэкенд), который слушает :8080 и сам
# отдаёт и API, и встроенный SPA. Отдельного web/nginx больше нет.

# Префикс реестра для образа (например registry.example.com).
# Пусто - образ тянется как есть (repository:tag).
imageRegistry: ""
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Portal: API + встроенный SPA.
portal:
  replicaCount: 1
  image:
    repository: console
    # tag по умолчанию = .Chart.AppVersion
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  securityContext: {}

  # Несекретные переменные окружения портала. Ключи соответствуют env-тегам
  # internal/config/config.go. Пустые значения не рендерятся (применяется дефолт
  # из config.go). Полный список переменных см. в .env.example репозитория idp.
  config:
    HTTP_PORT: "8080"
    PUBLIC_URL: "https://console.example.com"
    # Хранилища: postgres|memory, redis|memory.
    STORE: postgres
    CACHE: redis
    # Аутентификация: oidc|dev.
    AUTH_MODE: oidc
    OIDC_ISSUER: "https://keycloak.example.com/realms/internal"
    OIDC_CLIENT_ID: portal
    OIDC_REDIRECT_URL: "https://console.example.com/api/v1/auth/callback"
    OIDC_SCOPES: "openid,profile,email,groups"
    # RBAC: группы Keycloak для ролей.
    RBAC_ADMIN_GROUPS: platform-admins
    RBAC_SUPPORT_GROUPS: support
    RBAC_SECURITY_GROUPS: security
    RBAC_TEAM_GROUP_PREFIX: team-
    # Апстримы: real|fake.
    HARBOR_MODE: real
    GITLAB_MODE: real
    ARGOCD_MODE: real
    HARBOR_URL: ""
    GITLAB_URL: ""
    ARGOCD_URL: ""
    # Наблюдаемость.
    LOG_LEVEL: info
    LOG_FORMAT: json

  # Секретные переменные. Рендерятся в Secret (пустые значения пропускаются).
  # Чтобы использовать заранее созданный Secret - задайте existingSecret, тогда
  # эти значения игнорируются.
  existingSecret: ""
  secrets:
    DATABASE_URL: ""
    REDIS_URL: ""
    SESSION_SECRET: ""
    OIDC_CLIENT_SECRET: ""
    HARBOR_ROBOT_USER: ""
    HARBOR_ROBOT_TOKEN: ""
    GITLAB_TOKEN: ""
    ARGOCD_TOKEN: ""

# Ingress чарт не создаёт: вход в console публикуется снаружи (например через
# отдельный ingress-gateway), маршрутизируя трафик на Service portal (:8080).

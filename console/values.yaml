# Default values for the console chart.
# console is a single component: portal (Go backend) which listens on :8080 and
# serves both the API and the embedded SPA. There is no separate web/nginx anymore.

# Registry prefix for the image (for example registry.example.com).
# Empty - the image is pulled as is (repository:tag).
imageRegistry: ""
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Portal: API + embedded SPA.
portal:
  replicaCount: 1
  image:
    # Portal image: {imageRegistry}/console/portal. imageRegistry sets the registry
    # prefix (for example ghcr.io/awbait).
    repository: console/portal
    # default tag = .Chart.AppVersion
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8080
  # Prometheus metrics are exposed on a separate port (config METRICS_PORT below).
  # enabled adds the port to the Service and containerPort; scrapeAnnotations sets
  # prometheus.io/* on the pod (scrape without a ServiceMonitor). port must match
  # config METRICS_PORT.
  metrics:
    enabled: true
    port: 2112
    scrapeAnnotations: true
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  securityContext: {}

  # Non-secret environment variables for the portal. Keys match the env tags in
  # internal/config/config.go. Empty values are not rendered (the default from
  # config.go applies). See the full list of variables in the .env.example of the
  # console repository.
  config:
    HTTP_PORT: "8080"
    PUBLIC_URL: "https://console.example.com"
    # Stores: postgres|memory, redis|memory.
    STORE: postgres
    CACHE: redis
    # Authentication: oidc only (the single valid mode).
    AUTH_MODE: oidc
    OIDC_ISSUER: "https://keycloak.example.com/realms/internal"
    OIDC_CLIENT_ID: portal
    OIDC_REDIRECT_URL: "https://console.example.com/api/v1/auth/callback"
    OIDC_SCOPES: "openid,profile,email,groups"
    # RBAC: Keycloak groups for roles.
    RBAC_ADMIN_GROUPS: platform-admins
    RBAC_SUPPORT_GROUPS: support
    RBAC_SECURITY_GROUPS: security
    RBAC_TEAM_GROUP_PREFIX: team-
    HARBOR_URL: ""
    GITLAB_URL: ""
    ARGOCD_URL: ""
    # Observability. Prometheus metrics - on a separate port (must match
    # portal.metrics.port above).
    METRICS_PORT: "2112"
    LOG_LEVEL: info
    LOG_FORMAT: json
    # Sessions and cookie.
    SESSION_TTL: "24h"
    SESSION_COOKIE_NAME: idp_session
    COOKIE_SECURE: "true"
    OIDC_POST_LOGIN_REDIRECT: "/"
    # GitLab GitOps: group, team subgroup template, branch, MR auto-merge.
    GITLAB_GITOPS_GROUP: managed-services
    GITLAB_TEAM_SUBGROUP_TEMPLATE: "team-{{.Team}}"
    GITLAB_DEFAULT_BRANCH: main
    GITLAB_AUTO_MERGE: "false"
    # Harbor: projects to scan for the catalog.
    HARBOR_PROJECTS: "platform,managed-services"
    # ArgoCD: project, cluster, Application name template.
    ARGOCD_PROJECT: portal-managed
    ARGOCD_DEFAULT_CLUSTER: in-cluster
    ARGOCD_APP_NAME_TEMPLATE: "{{.Team}}-{{.Chart}}-{{.ServiceName}}"
    # Statuses: update mode and polling interval.
    STATUS_UPDATE_MODE: polling
    STATUS_POLL_INTERVAL: "15s"
    # Feature flags for the catalog and drift.
    DRIFT_DETECTION_ENABLED: "true"
    IMPORT_DISCOVERY_ENABLED: "false"
    CATALOG_AUTODISCOVER: "false"

  # Secret variables. Rendered into a Secret (empty values are skipped).
  # To use a pre-created Secret - set existingSecret, then these values are ignored.
  existingSecret: ""
  secrets:
    DATABASE_URL: ""
    REDIS_URL: ""
    SESSION_SECRET: ""
    OIDC_CLIENT_SECRET: ""
    HARBOR_ROBOT_USER: ""
    HARBOR_ROBOT_TOKEN: ""
    GITLAB_TOKEN: ""
    ARGOCD_TOKEN: ""

# Collector: background collection of the cluster workload catalog into Valkey/Redis.
# Every POLL_INTERVAL it walks namespaces by label, collects controllers
# (Deployment/StatefulSet/DaemonSet) and writes a snapshot to Redis; the portal reads
# the snapshot from the same Redis and does not call the Kubernetes API. The collector
# has no HTTP and no metrics - so neither a Service nor probes. enabled=false fully
# disables the component.
collector:
  enabled: true
  replicaCount: 1
  image:
    # Collector image: {imageRegistry}/console/collector.
    repository: console/collector
    # default tag = .Chart.AppVersion
    tag: ""
    pullPolicy: IfNotPresent
  # Separate ServiceAccount: the collector needs read-only RBAC on the cluster.
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  # ClusterRole + ClusterRoleBinding (read-only: namespaces + apps controllers).
  # Disable create if the permissions are granted externally.
  rbac:
    create: true
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  securityContext: {}
  # Non-secret env (collector/config.go). Empty values are not rendered.
  config:
    # Namespace selector for scanning (empty = all namespaces).
    NS_LABEL_SELECTOR: "idp.scan=true"
    # Walk period.
    POLL_INTERVAL: "30s"
    # Cluster name - included in the prefix of the snapshot key in Redis.
    CLUSTER_NAME: default
    # Prefix for snapshot keys in Redis.
    KEY_PREFIX: "k8s:catalog"
  # Secrets. existingSecret (with a REDIS_URL key) disables rendering secrets.
  existingSecret: ""
  secrets:
    # Connection to Valkey/Redis (required). The same Redis as the portal.
    REDIS_URL: ""

# Ingress. By default the chart does not create it: traffic is published externally
# (a separate ingress-gateway instance) to the portal Service (:8080).
#
# Optionally you can bring up ingress directly from this chart - via the
# ingress-gateway subchart (Istio Gateway API). Enabling it requires Istio + Gateway
# API CRDs in the cluster and brings up a Gateway + HTTPRoute on the portal Service.
# The values mirror the ingress-gateway chart (see charts/ingress-gateway/values.yaml);
# below is a working example.
ingressGateway:
  enabled: false
  naming:
    instanceTag: ru1
    clusterTag: k8s1
    projectTag: cnsl
  gateways:
    - name: main
      enabled: true
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          hostname: console.example.com
  xroutes:
    - name: portal
      enabled: true
      kind: HTTPRoute
      parentRefs:
        - gateway: main
          sectionName: http
      hostnames:
        - console.example.com
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            # Portal Service name: {release}-portal (default console-portal).
            - name: console-portal
              port: 8080

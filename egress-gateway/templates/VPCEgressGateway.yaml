{{/*
VpcEgressGateway (kube-ovn) - one per vpcEgressGateway list item.

Hardcoded in the template (not configurable via values):
  vpc, externalSubnet, trafficPolicy, nodeSelector, policies.
The user sets only: name, externalIPs (and enabled).

Derived (not configurable):
  - replicas      = number of externalIPs;
  - selectors     namespaceSelector + podSelector point at the Istio egress
                  gateway created from .Values.egressGateway: the release
                  namespace and the waypoint pods of that Gateway
                  (label gateway.networking.k8s.io/gateway-name).

A VpcEgressGateway only makes sense together with the egress Gateway it points
at, so egressGateway must be enabled and named when this section is used.
*/}}
{{- if .Values.vpcEgressGateway }}
{{- $root := . }}
{{- $gw := .Values.egressGateway | default dict }}
{{- if not (and $gw (eq (include "egress-gateway.helpers.app.enabled" $gw) "true")) }}
{{- fail "vpcEgressGateway requires egressGateway to be enabled (its selectors point at the egress gateway pods)" }}
{{- end }}
{{- $gwName := required "egressGateway.name is required when vpcEgressGateway is set" $gw.name }}
{{- $gwFullname := include "egress-gateway.helpers.app.fullname" (dict "kindShort" "egw" "name" $gwName "context" $root) }}
{{- range $index, $veg := .Values.vpcEgressGateway }}
{{- $externalIPs := required (printf "vpcEgressGateway[%d].externalIPs is required" $index) $veg.externalIPs }}
---
apiVersion: kubeovn.io/v1
kind: VpcEgressGateway
metadata:
  name: {{ include "egress-gateway.helpers.app.fullname" (dict "kindShort" "veg" "name" (required (printf "vpcEgressGateway[%d].name is required" $index) $veg.name) "context" $root) }}
  namespace: {{ $root.Release.Namespace | quote }}
  {{- include "egress-gateway.helpers.app.metadata" (dict "context" $root) | nindent 2 }}
spec:
  vpc: ovn-cluster
  replicas: {{ len $externalIPs }}
  externalSubnet: egress-vip
  externalIPs:
    {{- include "egress-gateway.helpers.tplvalues.render" (dict "value" $externalIPs "context" $root) | nindent 4 }}
  nodeSelector:
    - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
            - worker-node-3
            - worker-node-5
  selectors:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ $root.Release.Namespace | quote }}
    - podSelector:
        matchLabels:
          gateway.networking.k8s.io/gateway-name: {{ $gwFullname }}
  policies:
    - snat: true
      subnets:
        - ovn-default
    - snat: false
      ipblocks:
        - 172.30.10.0/28
  trafficPolicy: Cluster
{{- end }}
{{- end }}

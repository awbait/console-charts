{{/*
TLSRoute - defined as an explicit tlsRoutes list.
parentRefs are NOT set by the user but generated: the route is bound to the
egressGateway items that have a listener with a hostname from route.hostnames.

A separate TLSRoute (with a single parentRef) is created for EACH matched
Gateway; the name follows the convention with parentGatewayName:
  {instanceTag}-{clusterTag}-egw-{parentGatewayName}-{projectTag}-{routeName}
If no listener matched, rendering fails.
Fields: name (2..6), hostnames[], rules[].backendRefs[] (name/port are required,
weight is optional). enabled: false -> the route is skipped.
*/}}
{{- range $routeIndex, $route := .Values.tlsRoutes }}
{{- if ($route.enabled | default true) }}
{{- $routeName := required (printf "tlsRoutes[%d].name is required" $routeIndex) $route.name }}
{{- $hostnames := required (printf "tlsRoutes[%d].hostnames is required" $routeIndex) $route.hostnames }}
{{- $genericAnnotations := include "egress-gateway.helpers.app.genericAnnotations" $ }}
{{- $matched := false }}
{{- range $gw := $.Values.egressGateway }}
{{- if ($gw.enabled | default true) }}
{{- $match := false }}
{{- range $listener := $gw.listeners }}
{{- if has $listener.hostname $hostnames }}
{{- $match = true }}
{{- end }}
{{- end }}
{{- if $match }}
{{- $matched = true }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: {{ include "egress-gateway.helpers.app.fullname" (dict "kindShort" "egw" "parent" $gw.name "name" $routeName "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "egress-gateway.helpers.app.labels" $ | nindent 4 }}
  {{- if $genericAnnotations }}
  annotations:
    {{- $genericAnnotations | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - kind: Gateway
      name: {{ include "egress-gateway.helpers.app.fullname" (dict "kindShort" "egw" "name" $gw.name "context" $) }}
      namespace: {{ $.Release.Namespace }}
  hostnames:
    {{- range $hostname := $hostnames }}
    - {{ $hostname | quote }}
    {{- end }}
  rules:
    {{- range $rule := $route.rules }}
    - backendRefs:
        {{- range $backend := $rule.backendRefs }}
        - name: {{ required "tlsRoutes[].rules[].backendRefs[].name is required" $backend.name | quote }}
          port: {{ required "tlsRoutes[].rules[].backendRefs[].port is required" $backend.port }}
          {{- with $backend.weight }}
          weight: {{ . }}
          {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if not $matched }}
{{- fail (printf "tlsRoutes[%d] (%s): no egressGateway listener matched hostnames %v; cannot generate parentRefs" $routeIndex $routeName $hostnames) }}
{{- end }}
{{- end }}
{{- end }}

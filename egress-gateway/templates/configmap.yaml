{{/*
ConfigMap for the waypoint operator - one per gateway. Shares the same name as
the Gateway (kindShort egw); the Gateway references it via parametersRef (see
gateway.yaml).
data.service - patch for the waypoint Service: disable NodePort and drop port 15021.
Skipped when the gateway is disabled.
*/}}
{{- $gw := .Values.egressGateway | default dict }}
{{- if and $gw (eq (include "egress-gateway.helpers.app.enabled" $gw) "true") }}
{{- $gwName := required "egressGateway.name is required" $gw.name }}
{{- $genericAnnotations := include "egress-gateway.helpers.app.genericAnnotations" $ }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "egress-gateway.helpers.app.fullname" (dict "kindShort" "egw" "name" $gwName "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "egress-gateway.helpers.app.labels" $ | nindent 4 }}
  {{- if $genericAnnotations }}
  annotations:
    {{- $genericAnnotations | nindent 4 }}
  {{- end }}
data:
  service: |
    spec:
      allocateLoadBalancerNodePorts: false
      ports:
      - "$patch": delete
        port: 15021
{{- end }}

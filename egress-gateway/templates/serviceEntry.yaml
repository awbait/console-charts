{{/*
ServiceEntry - generated from the egressGateway listeners (one per listener).
The external service is described directly in the listener:
  hostname  -> spec.hosts and the route backend
  port      -> spec.ports[].number
  protocol  -> spec.ports[].protocol (TLS or HTTPS)
  addresses -> static IPs: set -> resolution STATIC + endpoints,
               otherwise -> resolution DNS
Resource name by convention (kindShort egw, name = listener.name).
The whole section is skipped when the gateway is disabled.
*/}}
{{- $gw := .Values.egressGateway | default dict }}
{{- if ($gw.enabled | default true) }}
{{- range $index, $listener := $gw.listeners }}
{{- $seName := required (printf "egressGateway.listeners[%d].name is required" $index) $listener.name }}
{{- $hostname := required (printf "egressGateway.listeners[%d].hostname is required" $index) $listener.hostname }}
{{- $port := required (printf "egressGateway.listeners[%d].port is required" $index) $listener.port }}
{{- $protocol := include "egress-gateway.helpers.listenerProtocol" (dict "label" (printf "egressGateway.listeners[%d].protocol" $index) "value" $listener.protocol) }}
{{- $addresses := $listener.addresses | default (list) }}
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: {{ include "egress-gateway.helpers.app.fullname" (dict "kindShort" "egw" "name" $seName "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  {{- include "egress-gateway.helpers.app.metadata" (dict "context" $) | nindent 2 }}
spec:
  hosts:
    - {{ $hostname | quote }}
  {{- if $addresses }}
  addresses:
    {{- range $address := $addresses }}
    - {{ $address | quote }}
    {{- end }}
  {{- end }}
  exportTo:
    {{- range $export := ($listener.exportTo | default (list ".")) }}
    - {{ $export | quote }}
    {{- end }}
  location: {{ $listener.location | default "MESH_EXTERNAL" }}
  resolution: {{ $listener.resolution | default (ternary "STATIC" "DNS" (gt (len $addresses) 0)) }}
  ports:
    - name: {{ $seName }}
      number: {{ $port }}
      protocol: {{ $protocol }}
  {{- if $addresses }}
  endpoints:
    {{- range $address := $addresses }}
    - address: {{ $address | quote }}
      ports:
        {{ $seName }}: {{ $port }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}

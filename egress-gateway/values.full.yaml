# ============================================================================
#  Helm-чарт: egress-gateway - полный reference значений
#  Все параметры с описанием. Чарт разворачивает egress через Istio Waypoint /
#  Gateway API и kube-ovn VpcEgressGateway. Независимые секции:
#
#    egressGateway      - ОДИН Gateway (Gateway API) с одним или несколькими
#                         TLS-Passthrough listener'ами и сопутствующий ConfigMap
#                         для waypoint operator. На каждый listener чарт также
#                         генерирует ServiceEntry и один Route.
#
#    vpcEgressGateway[] - VpcEgressGateway (kube-ovn): egress на уровне VPC
#                         (externalIPs, SNAT-политики). Его селекторы выводятся
#                         так, чтобы указывать на Gateway выше.
#
#  Конвенция именования ресурсов:
#    {instanceTag}-{clusterTag}-{kindShort}-{projectTag}-{name}
# ============================================================================


# ----------------------------------------------------------------------------
# naming - общие теги для имён ресурсов (см. конвенцию выше)
# ----------------------------------------------------------------------------
# instanceTag / clusterTag / projectTag задаются один раз на релиз.
# kindShort подставляется автоматически по типу ресурса:
#   egw - Istio Egress-Gateway  (Gateway, ConfigMap, ServiceEntry, TLSRoute/HTTPRoute)
#   veg - VPC Egress Gateway    (VpcEgressGateway)
# name задаётся на каждый ресурс (2..6 символов, DNS-формат).
naming:
  # Тег инстанса (таблица 50). Обязателен, DNS-формат lower-case.
  instanceTag: ru1

  # Тег кластера (таблица 52). Обязателен, DNS-формат lower-case.
  clusterTag: k8s1

  # Тег проекта. Обязателен, 2..6 символов, DNS-формат lower-case.
  projectTag: nbox

generic:
  # Общие labels для всех ресурсов чарта.
  labels:
    environment: production
    team: platform

  # Общие annotations для всех ресурсов чарта.
  annotations:
    owner: platform-team
    monitoring: "true"


# ============================================================================
# egressGateway - ОДИН egress-шлюз (Gateway + ConfigMap)
# ============================================================================
# Один Gateway на релиз; в нём может быть больше одного listener. Каждый listener
# порождает listener в Gateway, ServiceEntry и один Route.
#   name           - обязателен, 2..6 символов; {name} в имени Gateway/ConfigMap (egw)
#   enabled        - по умолчанию true; false -> ничего из этой секции не создаётся
#   listeners[]    - обязателен, минимум один listener:
#     name       - обязателен, 2..6 символов; {name} в имени ServiceEntry, в имени
#                  listener в Gateway и в имени Route (конвенция с родителем)
#     hostname   - обязателен, hostname / SNI; host ServiceEntry и backend маршрута
#     port       - обязателен
#     protocol   - TLS или HTTPS (по умолчанию TLS). Задаёт Kind маршрута:
#                  TLS -> TLSRoute, HTTPS -> HTTPRoute. tls.mode всегда Passthrough.
#     addresses  - статические IP внешнего сервиса; заданы -> resolution STATIC
#                  и endpoints в ServiceEntry, иначе -> resolution DNS
#     exportTo   - видимость ServiceEntry, по умолчанию ["."]
#     location   - по умолчанию MESH_EXTERNAL
#     resolution - override резолвинга ServiceEntry
egressGateway:
  enabled: true
  name: wp
  listeners:
    - name: nx
      hostname: repository.solution.test
      port: 443
      protocol: TLS
      addresses:
        - 10.40.20.50

    - name: art
      hostname: artifactory.solution.test
      port: 443
      protocol: HTTPS
      addresses:
        - 10.40.20.60


# ============================================================================
# vpcEgressGateway - VpcEgressGateway (kube-ovn), список
# ============================================================================
# Захардкожено в шаблоне (НЕ настраивается здесь): vpc, externalSubnet,
# trafficPolicy, nodeSelector, policies. Менять - в templates/VPCEgressGateway.yaml.
# Выводится автоматически (НЕ настраивается здесь):
#   replicas  = число externalIPs;
#   selectors = namespaceSelector + podSelector, указывающие на Gateway выше
#               (namespace релиза + под'ы его waypoint).
# Пользователь задаёт:
#   name        - обязателен, 2..6 символов; {name} в имени ресурса (veg)
#   enabled     - по умолчанию true
#   externalIPs - обязателен, внешние IP (replicas = len(externalIPs))
vpcEgressGateway:
  - name: core
    externalIPs:
      - 10.193.101.10
      - 10.193.101.11

  - name: core2
    externalIPs:
      - 10.193.101.12
      - 10.193.101.13
      - 10.193.101.14

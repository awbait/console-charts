# egress-gateway - дефолтные значения (минимум, чтобы рендер проходил).
# Пустые дефолты: ничего не создаётся. Чарт автоматически подгружает этот файл
# при каждом `helm template`, поэтому в нём НЕ должно быть примера
# egressGateway/vpcEgressGateway (иначе они домержатся в каждый заказ, который
# опускает эти ключи). Заказ передаёт свои значения; naming.* обязателен
# (валидируется через values.schema.json).
# Полный reference параметров - values.full.yaml; рабочий пример - values.minimal.yaml.

naming:
  instanceTag: ru1     # обязателен, DNS-формат lower-case
  clusterTag: k8s1     # обязателен, DNS-формат lower-case
  projectTag: nbox     # обязателен, 2..6 символов

generic:
  labels: {}
  annotations: {}

# egressGateway (одиночный объект) намеренно НЕ задан здесь - его передаёт заказ.
# Аннотированный reference - в values.full.yaml.

vpcEgressGateway: []

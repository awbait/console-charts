# Минимальный пример: один namespace waypoint proxy.
#
# Имя ресурса по конвенции: {instanceTag}-{clusterTag}-{kindShort}-{projectTag}-{name}
# На выходе (при naming ниже):
# - Gateway ru1-k8s1-wp-nbox-mesh

naming:
  instanceTag: ru1     # required, DNS-формат
  clusterTag: k8s1     # required, DNS-формат
  projectTag: nbox     # required, 2..6 символов

generic:
  labels: {}
  annotations: {}

waypoints:
  - name: mesh
    enabled: true
    for: service

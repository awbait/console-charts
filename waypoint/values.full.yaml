# ============================================================================
#  Helm chart: waypoint - full values reference
#  The chart provisions an Istio ambient waypoint proxy (Gateway API, class
#  istio-waypoint, listener HBONE/15008). Single section:
#
#    waypoints[] - list of waypoints. A Gateway is created per item.
#
#  Resource naming convention:
#    {instanceTag}-{clusterTag}-{kindShort}-{projectTag}-{name}
#  kindShort: wp (waypoint Gateway).
# ============================================================================


# ----------------------------------------------------------------------------
# naming - common tags for resource names (see convention above)
# ----------------------------------------------------------------------------
# instanceTag / clusterTag / projectTag are set once per release.
# kindShort is substituted automatically (wp). name is set per waypoint
# (2..6 characters, DNS format).
naming:
  # Instance tag (table 50). Required, lower-case DNS format.
  instanceTag: ru1

  # Cluster tag (table 52). Required, lower-case DNS format.
  clusterTag: k8s1

  # Project tag. Required, 2..6 characters, lower-case DNS format.
  projectTag: nbox

generic:
  # Common labels for all chart resources.
  labels:
    environment: production
    team: platform

  # Common annotations for all chart resources.
  annotations:
    owner: platform-team
    monitoring: "true"


# ============================================================================
# waypoints - list of waypoint proxies (a Gateway per item)
# ============================================================================
# Pods/services are bound to a waypoint via the label
#   istio.io/use-waypoint: {instanceTag}-{clusterTag}-wp-{projectTag}-{name}
#   name    - required, 2..6 characters; {name} in the Gateway name
#   enabled - default true; false -> Gateway is not created
#   for     - interception scope (istio.io/waypoint-for):
#             service (default) | workload | all
waypoints:
  - name: mesh
    enabled: true
    for: service

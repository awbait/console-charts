# ============================================================================
#  Helm chart: ingress-gateway - reference values.yaml
#  All parameters with descriptions. The chart deploys an ingress on top of
#  Istio / Gateway API. Independent sections (any combination can be used):
#
#    gateways[]           - Gateway (Gateway API) + infrastructure ConfigMap
#                           (Deployment/Service/HPA of the auto-created workload).
#    xroutes[]            - Route (HTTP/GRPC/TLS/TCP/UDP) to backend services.
#    networkPolicy        - NetworkPolicy for the workload of each Gateway.
#    authorizationPolicy  - AuthorizationPolicy (Istio) for the Gateway workload.
#    oidcAuth             - OIDC via oauth2-proxy + Keycloak (optional).
#
#  Resource naming convention:
#    {instanceTag}-{clusterTag}-{kindShort}-{projectTag}-{name}
# ============================================================================


# ----------------------------------------------------------------------------
# naming - common tags for resource names (see convention above)
# ----------------------------------------------------------------------------
# instanceTag / clusterTag / projectTag are set once per release.
# kindShort is substituted automatically by resource type:
#   igw - Gateway              hr  - HTTPRoute        tr  - TLSRoute
#   cm  - ConfigMap            gr  - GRPCRoute        tcr - TCPRoute
#   np  - NetworkPolicy        ur  - UDPRoute
#   ap  - AuthorizationPolicy
# name is set per Gateway/Route (2..6 characters, DNS format).
naming:
  # Instance tag (table 50). Required, DNS format lower-case.
  instanceTag: ru1

  # Cluster tag (table 52). Required, DNS format lower-case.
  clusterTag: k8s1

  # Project tag. Required, 2..6 characters, DNS format lower-case.
  projectTag: nbox

generic:
  # Common labels for all chart resources.
  labels:
    environment: production
    team: platform

  # Common annotations for all chart resources.
  annotations:
    owner: platform-team
    monitoring: "true"


# ============================================================================
# authorizationPolicy - Istio AuthorizationPolicy for the Gateway workload
# ============================================================================
# enabled: true -> an AuthorizationPolicy is created for each enabled Gateway
# (ALLOW for 0.0.0.0/0 by default). Fine-grained rule tuning is under development.
authorizationPolicy:
  enabled: true


# ============================================================================
# networkPolicy - Kubernetes NetworkPolicy for the Gateway workload
# ============================================================================
# enabled: true -> a NetworkPolicy is created for each enabled Gateway.
# Ingress is by default allowed on the Istio service ports (80/443/15020/15021/
# 15090). egress is provided by the user and is REQUIRED when enabled: true.
networkPolicy:
  enabled: true
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - port: 80
          protocol: TCP

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP


# ============================================================================
# gateways - list of Gateway (Gateway + ConfigMap per element)
# ============================================================================
#   name        - required, 2..6 characters; {name} in the Gateway/ConfigMap name,
#                 referenced from xroutes[].parentRefs[].gateway
#   enabled     - default true; false -> Gateway + ConfigMap are not created
#   ipAddress   - static LoadBalancer IP (-> MetalLB annotation in ConfigMap)
#   hpa         - HorizontalPodAutoscaler for the auto-created Deployment
#   resources   - resources of the istio-proxy container (-> ConfigMap.data.deployment)
#   listeners[] - list of listeners:
#     name          - listener name (sectionName in parentRefs); not limited to 2..6
#     port/protocol - required (HTTP/HTTPS/TCP/UDP/TLS)
#     hostname      - required for HTTPS/TLS
#     tlsMode       - Terminate (HTTPS default) | Passthrough (TLS default)
#     tlsSecretName - Secret with a certificate for tlsMode: Terminate. NOT required
#                     if the hostname matches secret auto-generation (below).
#     allowedRoutes - rules for admitting Routes to the listener
#
# TLS secret auto-generation (tlsMode: Terminate): by the listener hostname a
# Secret of type kubernetes.io/tls is created (you supply cert/key yourself):
#   *.idp.ecpk.test -> {instanceTag}-{clusterTag}-secret-{projectTag}-idptls
#   *edp.ecpk.test  -> {instanceTag}-{clusterTag}-secret-{projectTag}-edptls
#   other hostnames -> no secret is created, tlsSecretName/certificateRefs is needed.
gateways:
  - name: main
    enabled: true

    ipAddress: 127.0.0.1

    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      averageUtilization: 80

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    listeners:
      - name: http
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: HTTPRoute

      - name: https
        port: 443
        protocol: HTTPS
        hostname: app.example.ru
        tlsMode: Terminate
        tlsSecretName: app-example-ru-tls
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: HTTPRoute
            - kind: GRPCRoute

      - name: grpc
        port: 8443
        protocol: HTTPS
        hostname: grpc.example.ru
        tlsMode: Terminate
        tlsSecretName: grpc-example-ru-tls
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: GRPCRoute

      # tlsSecretName not set: hostname *.idp.ecpk.test -> auto secret
      # {instanceTag}-{clusterTag}-secret-{projectTag}-idptls.
      - name: idp
        port: 8444
        protocol: HTTPS
        hostname: "*.idp.ecpk.test"
        tlsMode: Terminate
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: HTTPRoute

      - name: tls-kf
        port: 9443
        protocol: TLS
        hostname: kafka.example.ru
        tlsMode: Passthrough
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: TLSRoute

      - name: tcp-pg
        port: 5432
        protocol: TCP
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: TCPRoute

      - name: udp-dns
        port: 53
        protocol: UDP
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: UDPRoute

  - name: intnl
    enabled: true
    listeners:
      - name: http-int
        port: 8080
        protocol: HTTP
        hostname: gtw-test2.example.test
        allowedRoutes:
          namespaces:
            from: Same
          kinds:
            - kind: HTTPRoute


# ============================================================================
# xroutes - list of Route (kind sets the type; apiVersion is selected automatically)
# ============================================================================
#   name        - required, 2..6 characters; {name} in the Route name
#   enabled     - default true
#   kind        - HTTPRoute (default) | GRPCRoute | TLSRoute | TCPRoute | UDPRoute
#   parentRefs[] - gateway (= gateways[].name) + sectionName (= listener.name)
#   hostnames[] - for HTTP/GRPC/TLS (for TLS - SNI)
#   rules[]     - matches/filters only for HTTP/GRPC; backendRefs are required
#                 (name/port; namespace and weight are optional)
#
# Simplifications with a SINGLE enabled Gateway (in this example there are two, so
# here the gateway is specified explicitly):
#   - parentRefs[].gateway may be omitted - the name of this Gateway is substituted;
#   - hostnames may be omitted - taken from the listeners by parentRefs[].sectionName.
xroutes:
  - name: app
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - gateway: main
        sectionName: http
      - gateway: main
        sectionName: https
    hostnames:
      - app.example.ru
      - www.app.example.ru
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        filters:
          - type: RequestHeaderModifier
            requestHeaderModifier:
              add:
                - name: x-routed-by
                  value: gateway-chart
        backendRefs:
          - name: app
            port: 80
            weight: 100
      - matches:
          - path:
              type: PathPrefix
              value: /api
        backendRefs:
          - name: api
            port: 8080
            weight: 100

  - name: ugrpc
    enabled: true
    kind: GRPCRoute
    parentRefs:
      - gateway: main
        sectionName: grpc
    hostnames:
      - grpc.example.ru
    rules:
      - matches:
          - method:
              service: users.UsersService
              method: GetUser
        backendRefs:
          - name: users-grpc
            port: 9090
            weight: 100

  - name: kafka
    enabled: true
    kind: TLSRoute
    parentRefs:
      - gateway: main
        sectionName: tls-kf
    hostnames:
      - kafka.example.ru
    rules:
      - backendRefs:
          - name: kafka
            port: 9093
            weight: 100

  - name: pg
    enabled: true
    kind: TCPRoute
    parentRefs:
      - gateway: main
        sectionName: tcp-pg
    rules:
      - backendRefs:
          - name: postgres
            port: 5432
            weight: 100

  - name: dns
    enabled: true
    kind: UDPRoute
    parentRefs:
      - gateway: main
        sectionName: udp-dns
    rules:
      - backendRefs:
          - name: dns-service
            port: 53
            weight: 100

  - name: intapp
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - gateway: intnl
        sectionName: http-int
    hostnames:
      - gtw-test2.example.test
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - name: nginx-service
            port: 80
            namespace: demo-core-test


# ============================================================================
# oidcAuth - OIDC via oauth2-proxy + Keycloak (optional)
# ============================================================================
# enabled: false by default. Resource names are user-defined (outside the 5-part
# convention; to be refined during development). When enabled: true the following
# are required: application, gateway, groupsPolicy.allowedGroups, keycloak.{issuer,jwksUri}.
oidcAuth:
  enabled: false

  application:
    namespace: sm-netbox-core
    hostnames:
      - sm-netbox.idp.ecpk.test

  gateway:
    name: gateway-main
    namespace: sm-netbox-ingress
    sectionName: https

  oauth2Route:
    pathPrefix: /oauth2

  referenceGrant:
    name: allow-netbox-to-oauth2proxy

  externalAuthPolicy:
    name: redirect-to-oauth2-proxy
    notPaths:
      - /oauth2/*

  groupsPolicy:
    name: groups-whitelist
    publicPaths:
      - /oauth2/*
    claimKey: request.auth.claims[groups]
    allowedGroups:
      - demo_dev_core_admin

  requestAuthentication:
    name: keycloak-jwt
    forwardOriginalToken: true

  keycloak:
    issuer: https://kc.idp.ecpk.test/realms/ecpk-dev
    jwksUri: https://kc.idp.ecpk.test/realms/ecpk-dev/protocol/openid-connect/certs

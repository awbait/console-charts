{{/*
NetworkPolicy for the workload of each enabled Gateway: one per element of
the gateways list (when networkPolicy.enabled). The workload is selected by the label
gateway.networking.k8s.io/gateway-name (set by the Istio Gateway controller)
= full Gateway name. Ingress is by default allowed on the Istio service ports,
egress is provided by the user (networkPolicy.egress, required when enabled).
*/}}
{{- $root := . -}}
{{- $networkPolicy := $root.Values.networkPolicy | default dict -}}
{{- if eq (include "ingress-gateway.helpers.app.enabled" $networkPolicy) "true" }}
{{- if not $networkPolicy.egress }}
{{- fail "networkPolicy.egress is required when networkPolicy.enabled=true" }}
{{- end }}
{{- range $index, $gateway := $root.Values.gateways }}
{{- if eq (include "ingress-gateway.helpers.app.enabled" $gateway) "true" }}
{{- $gatewayName := required (printf "gateways[%d].name is required" $index) $gateway.name }}
{{- $gatewayFullname := include "ingress-gateway.helpers.app.resourceName" (dict "kind" "Gateway" "name" $gatewayName "context" $root) }}
{{- $genericAnnotations := include "ingress-gateway.helpers.app.genericAnnotations" $root }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ingress-gateway.helpers.app.resourceName" (dict "kind" "NetworkPolicy" "name" $gatewayName "context" $root) }}
  namespace: {{ $root.Release.Namespace | quote }}
  labels:
    {{- include "ingress-gateway.helpers.app.labels" $root | nindent 4 }}
  {{- if $genericAnnotations }}
  annotations:
    {{- $genericAnnotations | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "ingress-gateway.helpers.app.gatewayWorkloadSelectorLabels" (dict "gatewayResourceName" $gatewayFullname) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 15020
          protocol: TCP
        - port: 15021
          protocol: TCP
        - port: 15090
          protocol: TCP
  egress:
    {{- include "ingress-gateway.helpers.tplvalues.render" (dict "value" $networkPolicy.egress "context" $root) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}

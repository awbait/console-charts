{{/*
TLS secrets for Gateway listeners with tlsMode: Terminate (HTTPS/TLS protocols).
The secret name is ALWAYS auto-generated by hostname (see
ingress-gateway.helpers.app.tlsSecretName) - the user does not set tlsSecretName:
  *.idp.ecpk.test -> {instanceTag}-{clusterTag}-secret-{projectTag}-idptls
  *.edp.ecpk.test -> {instanceTag}-{clusterTag}-secret-{projectTag}-edptls
  others        -> {instanceTag}-{clusterTag}-secret-{projectTag}-tls
Content: for idp/edp the platform PREDEFINED wildcard cert is injected
(.Values.tlsWildcards.idp/.edp); for others - an empty secret/placeholder (change me),
which the user/ops fills in. Duplicates by name are collapsed.
*/}}
{{- $root := . -}}
{{- $wild := $root.Values.tlsWildcards | default dict -}}
{{- $seen := dict -}}
{{- range $gIndex, $gateway := $root.Values.gateways }}
{{- if eq (include "ingress-gateway.helpers.app.enabled" $gateway) "true" }}
{{- range $lIndex, $listener := $gateway.listeners }}
{{- $protocol := upper ($listener.protocol | default "" | toString) }}
{{- if or (eq $protocol "HTTPS") (eq $protocol "TLS") }}
{{- $tlsMode := $listener.tlsMode | default "Passthrough" }}
{{- if eq $tlsMode "Terminate" }}
{{- $secretName := include "ingress-gateway.helpers.app.tlsSecretName" (dict "hostname" $listener.hostname "context" $root) }}
{{- if not (hasKey $seen $secretName) }}
{{- $_ := set $seen $secretName true }}
{{- $hostname := $listener.hostname | default "" | toString | lower }}
{{- $crt := "" }}{{- $key := "" }}
{{- if contains "idp.ecpk.test" $hostname }}{{- $crt = (($wild.idp | default dict).crt | default "") }}{{- $key = (($wild.idp | default dict).key | default "") }}
{{- else if contains "edp.ecpk.test" $hostname }}{{- $crt = (($wild.edp | default dict).crt | default "") }}{{- $key = (($wild.edp | default dict).key | default "") }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $root.Release.Namespace | quote }}
  {{- include "ingress-gateway.helpers.app.metadata" (dict "context" $root) | nindent 2 }}
type: kubernetes.io/tls
data:
  # idp/edp: platform predefined wildcard cert; others: empty - fill in base64 (change me).
  tls.crt: {{ $crt | quote }}
  tls.key: {{ $key | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

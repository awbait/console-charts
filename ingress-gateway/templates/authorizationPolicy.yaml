{{/*
AuthorizationPolicy (Istio) for the workload of each enabled Gateway: one
per element of the gateways list (when authorizationPolicy.enabled). The workload
is selected by the label gateway.networking.k8s.io/gateway-name = full Gateway name.
By default ALLOW for all sources (0.0.0.0/0); fine-grained rule tuning is
under development.
*/}}
{{- $root := . -}}
{{- $authorizationPolicy := $root.Values.authorizationPolicy | default dict -}}
{{- if eq (include "ingress-gateway.helpers.app.enabled" $authorizationPolicy) "true" }}
{{- range $index, $gateway := $root.Values.gateways }}
{{- if eq (include "ingress-gateway.helpers.app.enabled" $gateway) "true" }}
{{- $gatewayName := required (printf "gateways[%d].name is required" $index) $gateway.name }}
{{- $gatewayFullname := include "ingress-gateway.helpers.app.resourceName" (dict "kind" "Gateway" "name" $gatewayName "context" $root) }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "ingress-gateway.helpers.app.resourceName" (dict "kind" "AuthorizationPolicy" "name" $gatewayName "context" $root) }}
  namespace: {{ $root.Release.Namespace | quote }}
  {{- include "ingress-gateway.helpers.app.metadata" (dict "context" $root) | nindent 2 }}
spec:
  selector:
    matchLabels:
      {{- include "ingress-gateway.helpers.app.gatewayWorkloadSelectorLabels" (dict "gatewayResourceName" $gatewayFullname) | nindent 6 }}
  action: ALLOW
  rules:
    - from:
        - source:
            ipBlocks:
              - 0.0.0.0/0
{{- end }}
{{- end }}
{{- end }}

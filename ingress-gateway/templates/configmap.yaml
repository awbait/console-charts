{{/*
Infrastructure ConfigMap for the Istio Gateway controller: one per element
of the gateways list. It has the same name as the Gateway (kindShort cm); the
Gateway references it via parametersRef (see gateway.yaml).
data.deployment - a patch for the auto-created Deployment (securityContext, resources
of the istio-proxy container). data.service - a patch for the Service (LoadBalancer, disabling
NodePort, removing port 15021; when ipAddress is set - a MetalLB annotation).
data.horizontalPodAutoscaler - added when hpa.enabled.
The element is skipped when enabled: false.
*/}}
{{- $root := . -}}
{{- range $index, $gateway := $root.Values.gateways }}
{{- if eq (include "ingress-gateway.helpers.app.enabled" $gateway) "true" }}
{{- $gatewayName := required (printf "gateways[%d].name is required" $index) $gateway.name }}
{{- $ipAddress := "" -}}
{{- if hasKey $gateway "ipAddress" -}}
{{- $ipAddress = include "ingress-gateway.helpers.tplvalues.render" (dict "value" (index $gateway "ipAddress") "context" $root) | trim -}}
{{- end }}
{{- $hpa := $gateway.hpa | default dict -}}
{{- $hpaEnabled := $hpa.enabled | default false -}}
{{/* resources is hidden in the order form; apply a sane istio-proxy default when omitted (editable later from the product card). */}}
{{- $defaultResources := dict "requests" (dict "cpu" "100m" "memory" "128Mi") "limits" (dict "cpu" "2000m" "memory" "1024Mi") -}}
{{- $resources := $gateway.resources | default $defaultResources }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ingress-gateway.helpers.app.resourceName" (dict "kind" "ConfigMap" "name" $gatewayName "context" $root) }}
  namespace: {{ $root.Release.Namespace | quote }}
  {{- include "ingress-gateway.helpers.app.metadata" (dict "context" $root) | nindent 2 }}
data:
  {{- if $hpaEnabled }}
  horizontalPodAutoscaler: |
    spec:
      minReplicas: {{ $hpa.minReplicas | default 2 }}
      maxReplicas: {{ $hpa.maxReplicas | default 5 }}
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: {{ $hpa.averageUtilization | default 80 }}
  {{- end }}
  deployment: |
    spec:
      template:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          {{- if $resources }}
          containers:
            - name: istio-proxy
              resources:
                {{- include "ingress-gateway.helpers.tplvalues.render" (dict "value" $resources "context" $root) | nindent 16 }}
          {{- end }}
  service: |
    {{- if $ipAddress }}
    metadata:
      annotations:
        metallb.io/loadBalancerIPs: {{ $ipAddress | quote }}
    {{- end }}
    spec:
      allocateLoadBalancerNodePorts: false
      type: LoadBalancer
      externalTrafficPolicy: Cluster
      ports:
        - $patch: delete
          port: 15021
{{- end }}
{{- end }}
